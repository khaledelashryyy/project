<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartify — Sign Up</title>
    <meta name="description" content="Create your Cartify account for smarter shopping and automated returns." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />

    <!-- Animate CSS -->
    <link rel="stylesheet" href="./CSS/animate.min.css" />
    <!-- WOW CSS -->
    <link rel="stylesheet" href="./CSS/wow.min.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="./CSS/all.min.css" />
    <!-- Bootstrap -->
    <link rel="stylesheet" href="./CSS/bootstrap.min.css" />
    <!-- MDB Bootstrap -->
    <link rel="stylesheet" href="./CSS/mdb.min.css" />
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="./CSS/Style.css" />
  </head>

  <body class="auth-page d-flex align-items-center justify-content-center bg-light m-0">
    <div class="container d-flex justify-content-center">
      
      <div class="login-container signup-container bg-white rounded-5 shadow-lg position-relative p-3 my-4 animate__animated animate__zoomIn animate__faster" style="max-width: 440px; width: 100%;">

        <button class="btn-close position-absolute top-0 end-0 m-3" aria-label="Close" onclick="window.location.href='index.html'"></button>

        <div class="d-flex align-items-center justify-content-center mx-auto mb-2 wow animate__animated animate__bounceIn" data-wow-delay="0.3s">
          <img src="./img/E-commerce Logo.png" alt="Cartify Logo" class="img-fluid" style="max-height: 90px;" />
        </div>

        <div class="text-center mb-2 wow animate__animated animate__fadeInUp" data-wow-delay="0.4s">
          <h1 class="h5 fw-bold mb-1 header-title">Create Account</h1>
          <p class="text-muted small mb-0">Sign up for your Cartify account</p>
        </div>

        <form>
          <!-- Full Name -->

          <div class="mb-2 wow animate__animated animate__fadeInUp" data-wow-delay="0.5s">
            <label for="fullname" class="form-label small fw-bold text-dark mb-1" style="font-size: 0.8rem;">Full Name</label>
            <input type="text" class="form-control rounded-pill py-1 px-3 small custom-input" id="fullname" placeholder="Khaled Mohamed" />
          </div>

          <!-- Email -->

          <div class="mb-2 wow animate__animated animate__fadeInUp" data-wow-delay="0.6s">
            <label for="email" class="form-label small fw-bold text-dark mb-1" style="font-size: 0.8rem;">Email Address</label>
            <input type="email" class="form-control rounded-pill py-1 px-3 small custom-input" id="email" placeholder="name@example.com" />
          </div>

          <!-- Password -->

          <div class="mb-2 wow animate__animated animate__fadeInUp" data-wow-delay="0.7s">
            <label for="password" class="form-label small fw-bold text-dark mb-1" style="font-size: 0.8rem;">Password</label>
            <input type="password" class="form-control rounded-pill py-1 px-3 small custom-input" id="password" placeholder="••••••••" />
          </div>

          <!-- Confirm Password -->

          <div class="mb-2 wow animate__animated animate__fadeInUp" data-wow-delay="0.8s">
            <label for="confirm-password" class="form-label small fw-bold text-dark mb-1" style="font-size: 0.8rem;">Confirm Password</label>
            <input type="password" class="form-control rounded-pill py-1 px-3 small custom-input" id="confirm-password" placeholder="••••••••" />
          </div>

          <!-- Terms -->

          <div class="mb-2 wow animate__animated animate__fadeInUp" data-wow-delay="0.85s">
            <div class="form-check mb-0">
              <input class="form-check-input" type="checkbox" id="terms" />
              <label class="form-check-label text-muted" for="terms" style="font-size: 0.75rem;">
                I agree to the <a href="#" class="text-decoration-none fw-bold signup-link">Terms</a> &amp; <a href="#" class="text-decoration-none fw-bold signup-link">Privacy</a>
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 rounded-pill py-1 mt-1 fw-bold primary-btn wow animate__animated animate__fadeInUp" data-wow-delay="0.9s">
            Create Account
          </button>
        </form>

        <div class="d-flex align-items-center my-2 wow animate__animated animate__fadeIn" data-wow-delay="1s">
          <hr class="flex-grow-1 text-muted m-0" />
          <span class="mx-3 text-uppercase text-muted fw-semibold" style="letter-spacing: 0.05em; font-size: 0.65rem;">Or sign up with</span>
          <hr class="flex-grow-1 text-muted m-0" />
        </div>

        <div class="d-flex gap-2 mb-2 wow animate__animated animate__fadeInUp" data-wow-delay="1.1s">
          <button type="button" class="btn btn-outline-secondary w-100 rounded-pill d-flex align-items-center justify-content-center py-1 social-btn">
            <i class="fa-brands fa-google fa-lg mx-2" style="color: rgb(0, 0, 0);"></i>
            <span class="fw-semibold text-dark text-capitalize" style="font-size: 0.8rem;">Google</span>
          </button>

          <button type="button" class="btn btn-outline-secondary w-100 rounded-pill d-flex align-items-center justify-content-center py-1 social-btn">
            <i class="fa-brands fa-apple fs-6 me-2 text-dark"></i>
            <span class="fw-semibold text-dark text-capitalize" style="font-size: 0.8rem;">Apple</span>
          </button>
        </div>

        <div class="text-center wow animate__animated animate__fadeIn" data-wow-delay="1.2s">
          <p class="text-muted mb-0" style="font-size: 0.8rem;">Already have an account? <a href="./login.html" class="text-decoration-none fw-bold text-primary signup-link">Login</a></p>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="./Js/all.min.js"></script>
    <script src="./Js/wow.min.js"></script>
    <script>new WOW().init();</script>
    <script src="./Js/jquery.slim.min.js"></script>
    <script src="./Js/popper.min.js"></script>
    <script src="./Js/bootstrap.min.js"></script>
    <script src="./Js/mdb.umd.min.js"></script>
    <script src="./Js/main.js"></script>
  </body>
</html>
