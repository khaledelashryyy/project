<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartify — Login</title>
    <meta name="description" content="Login to your Cartify account to access smarter shopping and automated returns." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />

    <!-- Animate CSS -->
    <link rel="stylesheet" href="./CSS/animate.min.css" />
    <!-- WOW CSS -->
    <link rel="stylesheet" href="./CSS/wow.min.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="./CSS/all.min.css" />
    <!-- Bootstrap -->
    <link rel="stylesheet" href="./CSS/bootstrap.min.css" />
    <!-- MDB Bootstrap -->
    <link rel="stylesheet" href="./CSS/mdb.min.css" />
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="./CSS/Style.css" />
  </head>
  
  <body class="auth-page min-vh-100 d-flex align-items-center justify-content-center bg-light m-0">
    <div class="container d-flex justify-content-center px-3">
      <div class="login-container bg-white rounded-5 shadow-lg position-relative p-4 animate__animated animate__zoomIn animate__faster" style="max-width: 440px; width: 100%;">

        <button class="btn-close position-absolute top-0 end-0 m-4" aria-label="Close" onclick="window.location.href='index.html'"></button>

        <div class="d-flex align-items-center justify-content-center mx-auto mb-3 wow animate__animated animate__bounceIn" data-wow-delay="0.3s">
          <img src="./img/E-commerce Logo.png" alt="Cartify Logo" class="img-fluid" style="max-height: 140px;" />
        </div>

        <div class="text-center mb-3 wow animate__animated animate__fadeInUp" data-wow-delay="0.4s">
          <h1 class="h4 fw-bold mb-1 header-title">Welcome Back</h1>
          <p class="text-muted small mb-0">Login to your Cartify account</p>
        </div>

        <form>
          <div class="mb-3 wow animate__animated animate__fadeInUp" data-wow-delay="0.5s">
            <label for="email" class="form-label small fw-bold text-dark mb-1">Email Address</label>
            <input type="email" class="form-control rounded-pill py-2 px-3 small custom-input h-50" id="email" placeholder="name@example.com" />
          </div>

          <div class="mb-3 wow animate__animated animate__fadeInUp" data-wow-delay="0.6s">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <label for="password" class="form-label small fw-bold text-dark mb-0">Password</label>
              <a href="#" class="small text-decoration-none fw-bold text-primary forgot-link">Forgot Password?</a>
            </div>
            <input type="password" class="form-control rounded-pill py-2 px-3 small custom-input h-50" id="password" placeholder="••••••••" />
          </div>

          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-2 fw-bold primary-btn h-50 wow animate__animated animate__fadeInUp" data-wow-delay="0.7s">
            Login
          </button>
        </form>

        <div class="d-flex align-items-center my-3 wow animate__animated animate__fadeIn" data-wow-delay="0.8s">
          <hr class="flex-grow-1 text-muted" />
          <span class="mx-3 text-uppercase text-muted small fw-semibold" style="letter-spacing: 0.05em; font-size: 0.75rem;">Or continue with</span>
          <hr class="flex-grow-1 text-muted" />
        </div>

        <div class="d-flex gap-2 mb-3 wow animate__animated animate__fadeInUp" data-wow-delay="0.9s">
          <button type="button" class="btn btn-outline-secondary w-100 rounded-pill d-flex align-items-center justify-content-center py-2 social-btn">
            <i class="fa-brands fa-google fa-lg mx-2" style="color: rgb(0, 0, 0);"></i>
            <span class="fw-semibold text-dark text-capitalize" style="font-size: 0.85rem;">Google</span>
          </button>
          <button type="button" class="btn btn-outline-secondary w-100 rounded-pill d-flex align-items-center justify-content-center py-2 social-btn">
            <i class="fa-brands fa-apple fs-5 me-2 text-dark"></i>
            <span class="fw-semibold text-dark text-capitalize" style="font-size: 0.85rem;">Apple</span>
          </button>
        </div>

        <div class="text-center wow animate__animated animate__fadeIn" data-wow-delay="1s">
          <p class="small text-muted mb-0">Don't have an account? <a href="./signup.html" class="text-decoration-none fw-bold text-primary signup-link">Sign up</a></p>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="./Js/all.min.js"></script>
    <script src="./Js/wow.min.js"></script>
    <script>new WOW().init();</script>
    <script src="./Js/jquery.slim.min.js"></script>
    <script src="./Js/popper.min.js"></script>
    <script src="./Js/bootstrap.min.js"></script>
    <script src="./Js/mdb.umd.min.js"></script>
    <script src="./Js/main.js"></script>
  </body>
</html>
